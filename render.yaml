# ============================================================
# Render Blueprint — Intelishop Backend
# https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: intelishop-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: intelishop_backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "intelishop-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: intelishop-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://intelishop-frontend.vercel.app"
      - key: PYTHON_VERSION
        value: "3.10.11"

databases:
  - name: intelishop-db
    region: singapore
    plan: free
    databaseName: intelishop_db
    user: intelishop_db_user

